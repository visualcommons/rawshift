pre-commit:
  piped: true
  commands:
    fmt:
      priority: 1
      run: just fmt
    clippy-fix:
      priority: 2
      run: just clippy-fix
    check-modified:
      priority: 3
      run: git diff --exit-code || { echo "Auto-fixes were applied. Stage the changes and re-commit."; exit 1; }

pre-push:
  commands:
    fmt:
      run: just fmt-check
    clippy:
      run: just clippy
    test:
      run: just test

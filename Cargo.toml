[package]
name = "rawshift"
version = "0.1.0"
edition = "2024"
description = "RAW image processing library focused on compatibility, correctness, and interoperability"
license = "MPL-2.0"
repository = "https://github.com/justin13888/rawshift"
homepage = "https://github.com/justin13888/rawshift"
documentation = "https://docs.rs/rawshift"
keywords = ["raw", "image", "dng", "arw", "photo"]
categories = ["multimedia::images", "encoding", "parser-implementations"]
readme = "README.md"
rust-version = "1.85"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
binrw = "0.15"
image-webp = "0.2"
img-parts = "0.4"
jpeg-encoder = "0.7"
jxl-oxide = "0.12.5"
little_exif = "0.6"
rayon = "1.11.0"
ravif = { version = "0.13", optional = true }
serde = { version = "1.0", optional = true, features = ["derive"] }
thiserror = "2.0"
tracing = "0.1"
zune-core = "0.5"
zune-jpeg = "0.5"
zune-jpegxl = { version = "0.5", optional = true }
zune-png = "0.5"
zune-image = "0.5"
gif = "0.13"

[dev-dependencies]
clap = { version = "4.5", features = ["derive"] }
criterion = { version = "0.5", features = ["html_reports"] }
eyre = "0.6.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.50", features = ["full"] }
tracing = { version = "0.1", features = ["release_max_level_debug"] }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[features]
serde = ["dep:serde"]
avif = ["ravif"]
jxl-encode = ["zune-jpegxl"]
heic = []
# SIMD enables CPU-specific optimizations
# simd = []
full = ["serde", "avif", "jxl-encode", "heic"]

[profile.release]
lto = "thin"
codegen-units = 1

[profile.fast-debug]
inherits = "release"
debug = 1
incremental = true

[profile.test]
opt-level = 3
debug = 1
incremental = true

[[bench]]
name = "decode"
harness = false

[[bench]]
name = "demosaic"
harness = false

[[bench]]
name = "pipeline"
harness = false

[profile.bench]
lto = "thin"
codegen-units = 1

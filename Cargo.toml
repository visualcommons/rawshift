[package]
name = "rawshift"
version = "0.1.0"
edition = "2024"

[dependencies]
binrw = "0.15.0"
log = "0.4.29"
rayon = "1.11.0"
serde = { version = "1.0.228", optional = true, features = ["derive"] }
thiserror = "2.0.17"


[features]
serde = ["dep:serde"]
# SIMD enables CPU-specific optimizations
# simd = []

[profile.bench]
lto = "thin"
codegen-units = 1

[dev-dependencies]
eyre = "0.6.12"
tokio = { version = "1.48.0", features = ["full"] }

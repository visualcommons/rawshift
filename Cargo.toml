[package]
name = "rawshift"
version = "0.1.0"
edition = "2021"

[dependencies]
binrw = "0.15.0"
log = "0.4.29"
rayon = "1.11.0"
serde = { version = "1.0.228", optional = true, features = ["derive"] }
thiserror = "2.0.17"
zune-core = "0.4.12"
zune-jpeg = "0.4.13"
zune-png = "0.4.10"
zune-image = "0.4"


[features]
serde = ["dep:serde"]
# SIMD enables CPU-specific optimizations
# simd = []

[profile.bench]
lto = "thin"
codegen-units = 1

[dev-dependencies]
eyre = "0.6.12"
tokio = { version = "1.48.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0"
zune-image = "0.4"
clap = { version = "4.5", features = ["derive"] }

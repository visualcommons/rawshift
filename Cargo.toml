[package]
name = "rawshift"
version = "0.1.0"
edition = "2021"

[dependencies]
binrw = "0.15.0"
rayon = "1.11.0"
serde = { version = "1.0.228", optional = true, features = ["derive"] }
thiserror = "2.0.17"
zune-core = "0.4.12"
zune-jpeg = "0.4.13"
zune-png = "0.4.10"
zune-image = "0.4"
jxl-oxide = "0.10"
tracing = { version = "0.1.44", features = ["release_max_level_debug"] }

# Metadata encoding
jpeg-encoder = "0.6"
img-parts = "0.4"
little_exif = "0.6"
image-webp = "0.2"

# Optional encoding backends
ravif = { version = "0.12", optional = true }
zune-jpegxl = { version = "0.4", optional = true }

[features]
serde = ["dep:serde"]
avif = ["ravif"]
jxl-encode = ["zune-jpegxl"]
heic = []
# SIMD enables CPU-specific optimizations
# simd = []
full = ["serde", "avif", "jxl-encode", "heic"]

[profile.bench]
lto = "thin"
codegen-units = 1

[dev-dependencies]
eyre = "0.6.12"
tokio = { version = "1.48.0", features = ["full"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0"
zune-image = "0.4"
clap = { version = "4.5", features = ["derive"] }
tracing-subscriber = { version = "0.3.22", features = ["env-filter"] }

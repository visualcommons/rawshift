name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Must match rust-toolchain.toml exactly ("1.90.0" not "1.90"): rustup
      # treats the two as different toolchain entries, so components installed
      # under "1.90" are invisible when cargo activates "1.90.0" from the file.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Must match rust-toolchain.toml exactly — see the fmt job comment above.
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test fixtures
        run: bash scripts/fetch_test_fixtures.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Generate standard format fixtures
        run: cargo run -p rawshift-image --example generate_test_fixtures
      - run: cargo test --workspace

  test-all-features:
    name: Test (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
      # `rawshift-image/full` enables `avif` (decode links system dav1d via the
      # `image` crate; encode is pure-Rust gamut-avif), `heic` (pure-Rust
      # gamut-heic container/pipeline — no system library; pixel decode goes
      # through rawshift-hwdec, which `full`'s `hw` flag compiles as the
      # no-backend stub until the platform backends land), `jxl-encode`
      # (builds libjxl hermetically through gamut-jxl-sys — cmake + clang for
      # its bindings), and `jpeg-encode-jpegli-vendored` builds the vendored
      # google/jpegli submodule the same way (cmake + clang).
      - name: Check out jpegli build submodules
        # Init the vendored google/jpegli submodule and only its build-time
        # dependencies — the 111 MB `testdata` and `googletest` submodules are for
        # jpegli's own tests, which we disable, so they are skipped.
        run: |
          git submodule update --init crates/rawshift-image/third_party/jpegli
          git -C crates/rawshift-image/third_party/jpegli submodule update --init \
            third_party/highway third_party/libjpeg-turbo third_party/skcms \
            third_party/lcms third_party/libpng third_party/zlib third_party/sjpeg
      - name: Install system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libdav1d-dev cmake clang libclang-dev
      - name: Fetch test fixtures
        run: bash scripts/fetch_test_fixtures.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Generate standard format fixtures
        run: cargo run -p rawshift-image --example generate_test_fixtures
      - run: cargo test --workspace --features rawshift-image/full,rawshift-image/jpeg-encode-jpegli-vendored

  image-only:
    name: Build (image only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
      # The facade with only the `image` feature, and the image crate standalone.
      - run: cargo build -p rawshift --no-default-features --features image
      - run: cargo build -p rawshift-image

  video-only:
    name: Build (video only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
      # `rawshift-video` is parked and unpublished for v1, and the facade no
      # longer has a `video` feature, so this builds the crate directly.
      - run: cargo build -p rawshift-video --all-features
      # Assert the video build pulls in zero image crates — this is the contract
      # the image/video workspace split exists to guarantee, and it must keep
      # holding while the crate is parked.
      - name: Assert no image crates in the video dependency tree
        run: |
          tree=$(cargo tree -p rawshift-video --all-features --prefix none --no-dedupe)
          echo "$tree"
          if echo "$tree" | grep -qiE 'rawshift-image|zune-|libheif|libwebp|img-parts|little_exif|resvg|ravif|jxl-oxide|^image '; then
            echo "::error::video build pulled in image crates"
            exit 1
          fi
          echo "OK: video build is free of image crates"
      # Assert the parked crate stays out of the facade entirely.
      - name: Assert the facade does not depend on rawshift-video
        run: |
          tree=$(cargo tree -p rawshift --all-features --prefix none --no-dedupe)
          if echo "$tree" | grep -q 'rawshift-video'; then
            echo "::error::rawshift facade depends on the parked rawshift-video crate"
            exit 1
          fi
          echo "OK: facade is free of rawshift-video"

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-all-features]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test fixtures
        run: bash scripts/fetch_test_fixtures.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Generate standard format fixtures
        run: cargo run -p rawshift-image --example generate_test_fixtures
      - name: Print coverage report
        run: python3 scripts/test_coverage_report.py
      - name: Export coverage JSON
        run: python3 scripts/test_coverage_report.py --json > coverage.json
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.json

  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.92.0"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  # Optional nightly job for extra checks
  nightly:
    name: Nightly checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on unit tests
        run: cargo +nightly miri test -p rawshift-core -p rawshift-image --lib -- --skip tiff --skip dng --skip arw --skip export
        env:
          MIRIFLAGS: -Zmiri-disable-isolation

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets --features=serde -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test fixtures
        run: bash scripts/fetch_test_fixtures.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Generate standard format fixtures
        run: cargo run --example generate_test_fixtures
      - run: cargo test --features=serde

  test-all-features:
    name: Test (all features)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test fixtures
        run: bash scripts/fetch_test_fixtures.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Generate standard format fixtures
        run: cargo run --example generate_test_fixtures
      - run: cargo test --features=full

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [test-all-features]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Fetch test fixtures
        run: bash scripts/fetch_test_fixtures.sh
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Generate standard format fixtures
        run: cargo run --example generate_test_fixtures
      - name: Print coverage report
        run: python3 scripts/test_coverage_report.py
      - name: Export coverage JSON
        run: python3 scripts/test_coverage_report.py --json > coverage.json
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.json

  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --features=serde

  # Optional nightly job for extra checks
  nightly:
    name: Nightly checks
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
      - name: Run Miri on unit tests
        run: cargo +nightly miri test --lib -- --skip tiff --skip dng --skip arw --skip export
        env:
          MIRIFLAGS: -Zmiri-disable-isolation
